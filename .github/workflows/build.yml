name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Bebbo toolchain (Docker, linux/amd64)
        run: ./docker.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: DiskPart
          path: out/DiskPart.exe
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: DiskPart
          path: out

      - name: Set release date
        id: date
        run: echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Regenerate icon
        run: |
          pip install pillow -q
          python3 support/make_icon.py

      - name: Create LHA archive
        run: |
          ARCHIVE="DiskPart-${{ steps.date.outputs.DATE }}-PROTO.lha"
          python3 support/make_lha.py "$ARCHIVE" \
            "DiskPart:out/DiskPart.exe" \
            "DiskPart.info:DiskPart.info" \
            "README.md:README.md"
          ls -lh "$ARCHIVE"

      - name: Delete previous PROTO release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete proto --yes 2>/dev/null || true
          git push --delete origin proto 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create proto \
            --title "DiskPart ${{ steps.date.outputs.DATE }} PROTO" \
            --notes "Automated prototype build from commit \`${{ github.sha }}\`." \
            --prerelease \
            "DiskPart-${{ steps.date.outputs.DATE }}-PROTO.lha"
